name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - "source/app/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          # Upload api/ contents to HF Space root (Dockerfile, README.md, app/ package)
          api.upload_folder(
              folder_path="source/app/api",
              repo_id="hamynguyen/hdb-price-estimator",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
          )
          # Upload models/ to models/ path so Dockerfile can COPY models/ at build time
          api.upload_folder(
              folder_path="source/app/models",
              path_in_repo="models",
              repo_id="hamynguyen/hdb-price-estimator",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
          )
          EOF
